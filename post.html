<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中... - Xu Yan's Blog</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <!-- Texmath CSS for math layout -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/css/texmath.css">

    <style>
        :root {
            --bg-color: #faf2e2; /* 米黄色底色 */
            --text-color: #333333;
            --link-color: #a87b51;
            --meta-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Merriweather', 'Noto Serif SC', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            font-size: 18px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .meta {
            color: var(--meta-color);
            font-size: 0.9em;
            font-style: italic;
        }

        .content h2 {
            font-size: 1.8em;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .content h3 {
            font-size: 1.4em;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .content p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .content a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px dotted var(--link-color);
            transition: all 0.3s ease;
        }

        .content a:hover {
            color: #7a5839;
            border-bottom: 1px solid #7a5839;
        }

        .content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .content blockquote {
            border-left: 4px solid var(--link-color);
            margin: 20px 0;
            padding: 15px 20px;
            color: #666;
            font-style: italic;
            background: rgba(168, 123, 81, 0.05);
            border-radius: 0 8px 8px 0;
        }

        /* Code block adjustments */
        pre[class*="language-"] {
            border-radius: 8px;
            margin: 30px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
        }

        code[class*="language-"], pre[class*="language-"] {
            font-family: 'Courier New', Courier, monospace;
        }

        .back-link {
            display: inline-block;
            margin-top: 60px;
            margin-bottom: 20px;
            color: var(--link-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #7a5839;
        }

        #status {
            text-align: center;
            margin-top: 100px;
            color: var(--meta-color);
            font-style: italic;
        }

        /* Make KaTeX display math look better */
        .katex-display {
            margin: 1.5em 0 !important;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">正在准备渲染引擎... (Initializing...)</div>

        <header id="header" style="display: none;">
            <h1 id="post-title"></h1>
            <div class="meta" id="post-meta"></div>
        </header>

        <div class="content" id="content"></div>

        <a href="index.html#blog" class="back-link">← 返回首页 (Back to Home)</a>
    </div>

    <!-- Prism.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <!-- Markdown-it, KaTeX, and Texmath plugin -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            const statusEl = document.getElementById('status');
            
            if (!file) {
                statusEl.innerHTML = '<div style="color: #d32f2f;">错误：未指定博文文件 (Error: No file specified).</div>';
                return;
            }

            try {
                // Fetch the markdown file
                const response = await fetch(file);
                if (!response.ok) throw new Error(`无法找到文件: ${file}`);
                const text = await response.text();

                // Initialize markdown-it with texmath
                // Note: texmath needs to be used BEFORE calling md.render
                const md = window.markdownit({
                    html: true,
                    linkify: true,
                    typographer: true
                }).use(texmath, {
                    engine: katex,
                    delimiters: 'dollars',
                    katexOptions: { macros: { "\\RR": "\\mathbb{R}" } }
                });

                // Extract title (H1)
                const lines = text.split('\n');
                let title = "未命名博文";
                let contentText = text;
                if (lines[0].trim().startsWith('# ')) {
                    title = lines[0].trim().substring(2).trim();
                    contentText = lines.slice(1).join('\n');
                }

                // Update page metadata
                document.title = `${title} - Xu Yan's Blog`;
                document.getElementById('post-title').textContent = title;
                document.getElementById('post-meta').textContent = `预计阅读时间: ${Math.max(1, Math.ceil(text.length / 400))} 分钟`;

                // Render content
                document.getElementById('content').innerHTML = md.render(contentText);
                
                // Show content
                statusEl.style.display = 'none';
                document.getElementById('header').style.display = 'block';
                
                // Trigger code highlighting
                if (window.Prism) {
                    Prism.highlightAll();
                }

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<div style="color: #d32f2f;">加载失败 (Loading Failed): ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
