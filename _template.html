<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Xu Yan's Blog</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-color: #f7efdd; /* 米黄色底色 (Beige/Cream) */
            --text-color: #333333;
            --link-color: #a87b51;
            --meta-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Merriweather', 'Noto Serif SC', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            font-size: 18px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .meta {
            color: var(--meta-color);
            font-size: 0.9em;
            font-style: italic;
        }

        .content h2 {
            font-size: 1.8em;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .content h3 {
            font-size: 1.4em;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .content p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .content a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px dotted var(--link-color);
            transition: all 0.3s ease;
        }

        .content a:hover {
            color: #7a5839;
            border-bottom: 1px solid #7a5839;
        }

        /* Code block adjustments */
        pre[class*="language-"] {
            border-radius: 8px;
            margin: 30px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
        }

        code[class*="language-"], pre[class*="language-"] {
            font-family: 'Courier New', Courier, monospace;
        }

        .back-link {
            display: inline-block;
            margin-top: 60px;
            color: var(--link-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #7a5839;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>{{TITLE}}</h1>
            <div class="meta">发布于 {{DATE}} • 预计阅读时间: {{READ_TIME}} 分钟</div>
        </header>

        <div class="content">
{{CONTENT}}
        </div>

        <a href="index.html#blog" class="back-link">← 返回首页 (Back to Home)</a>
    </div>

    <!-- Prism.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
